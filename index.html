<!DOCTYPE html>
<html lang="et">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
  <title>Ussimäng</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #1a1a2e;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      min-height: 100dvh;
      font-family: 'Segoe UI', sans-serif;
      color: #eee;
      padding: 12px 8px;
      overflow: hidden;
      touch-action: none;
    }

    h1 {
      font-size: clamp(1.2rem, 5vw, 2rem);
      margin-bottom: 8px;
      color: #4ade80;
      letter-spacing: 2px;
    }

    #info {
      display: flex;
      gap: 30px;
      margin-bottom: 10px;
      font-size: clamp(0.9rem, 3.5vw, 1.1rem);
    }

    #info span { color: #4ade80; font-weight: bold; }

    #canvas-wrap {
      position: relative;
      line-height: 0;
    }

    canvas {
      border: 3px solid #4ade80;
      border-radius: 6px;
      background: #0f1923;
      display: block;
      /* size set by JS */
    }

    #message {
      margin-top: 10px;
      font-size: clamp(0.8rem, 3.5vw, 1rem);
      min-height: 1.4em;
      color: #facc15;
      text-align: center;
      padding: 0 8px;
    }

    /* D-pad */
    #dpad {
      margin-top: 14px;
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      grid-template-rows: repeat(3, 1fr);
      gap: 6px;
      width: min(180px, 42vw);
      height: min(180px, 42vw);
    }

    #dpad button {
      background: #2d3748;
      border: 2px solid #4a5568;
      border-radius: 10px;
      color: #e2e8f0;
      font-size: clamp(1.2rem, 5vw, 1.6rem);
      cursor: pointer;
      touch-action: manipulation;
      -webkit-tap-highlight-color: transparent;
      transition: background 0.1s;
    }

    #dpad button:active,
    #dpad button.pressed {
      background: #4ade80;
      color: #1a1a2e;
      border-color: #4ade80;
    }

    .dpad-empty { background: transparent; border: none !important; }

    /* Desktop controls hint */
    #kbd-hint {
      margin-top: 12px;
      font-size: 0.78rem;
      color: #64748b;
      text-align: center;
    }

    #kbd-hint kbd {
      background: #2d3748;
      border: 1px solid #4a5568;
      border-radius: 4px;
      padding: 1px 6px;
      font-size: 0.78rem;
      color: #cbd5e1;
    }

    @media (pointer: fine) {
      /* desktop — show keyboard hint, still show dpad smaller */
      #dpad { width: 150px; height: 150px; }
    }
  </style>
</head>
<body>

<h1>🐍 Ussimäng</h1>

<div id="info">
  Skoor: <span id="score">0</span>
  &nbsp;|&nbsp;
  Rekord: <span id="highscore">0</span>
</div>

<div id="canvas-wrap">
  <canvas id="canvas"></canvas>
</div>

<div id="message">Vajuta <strong>▶ ALUSTA</strong> või tühikut</div>

<div id="dpad">
  <div class="dpad-empty"></div>
  <button id="btn-up">▲</button>
  <div class="dpad-empty"></div>
  <button id="btn-left">◀</button>
  <button id="btn-start" style="font-size:clamp(0.55rem,2.2vw,0.7rem);letter-spacing:-0.5px;color:#facc15;border-color:#facc15;">▶ ALUSTA</button>
  <button id="btn-right">▶</button>
  <div class="dpad-empty"></div>
  <button id="btn-down">▼</button>
  <div class="dpad-empty"></div>
</div>

<div id="kbd-hint">
  Klaviatuur: <kbd>↑↓←→</kbd> liiguta &nbsp;|&nbsp; <kbd>P</kbd> paus &nbsp;|&nbsp; <kbd>tühik</kbd> alusta
</div>

<script>
  // ── Canvas sizing ──────────────────────────────────────────────
  const canvas = document.getElementById('canvas');
  const ctx    = canvas.getContext('2d');

  function resize() {
    // Leave room for header + dpad + message on screen
    const maxW = Math.min(window.innerWidth - 16, window.innerHeight * 0.52);
    const size = Math.floor(maxW / 20) * 20; // multiple of 20 grid cells
    canvas.width  = size;
    canvas.height = size;
    if (state !== 'running' && state !== 'paused') draw();
  }

  window.addEventListener('resize', resize);

  // ── Constants ─────────────────────────────────────────────────
  const COLS = 20, ROWS = 20;
  const DIR  = {
    UP:    {x: 0, y:-1},
    DOWN:  {x: 0, y: 1},
    LEFT:  {x:-1, y: 0},
    RIGHT: {x: 1, y: 0}
  };

  // ── State ──────────────────────────────────────────────────────
  let snake, dir, nextDir, food, score, highscore, state, interval, currentSpeed;
  // state: 'idle' | 'running' | 'paused' | 'dead'

  const scoreEl     = document.getElementById('score');
  const highscoreEl = document.getElementById('highscore');
  const messageEl   = document.getElementById('message');

  highscore = parseInt(localStorage.getItem('snake_hs') || '0');
  highscoreEl.textContent = highscore;
  state = 'idle';

  // ── Game logic ────────────────────────────────────────────────
  function init() {
    snake      = [{x:10,y:10},{x:9,y:10},{x:8,y:10}];
    dir        = DIR.RIGHT;
    nextDir    = DIR.RIGHT;
    score      = 0;
    scoreEl.textContent = 0;
    placeFood();
    currentSpeed = 140;
    state = 'running';
    messageEl.textContent = '';
    clearInterval(interval);
    interval = setInterval(tick, currentSpeed);
  }

  function placeFood() {
    let pos;
    do {
      pos = {x: Math.floor(Math.random()*COLS), y: Math.floor(Math.random()*ROWS)};
    } while (snake.some(s => s.x===pos.x && s.y===pos.y));
    food = pos;
  }

  function tick() {
    dir = nextDir;
    const head = {
      x: (snake[0].x + dir.x + COLS) % COLS,
      y: (snake[0].y + dir.y + ROWS) % ROWS
    };

    if (snake.some(s => s.x===head.x && s.y===head.y)) { die(); return; }

    snake.unshift(head);

    if (head.x===food.x && head.y===food.y) {
      score++;
      scoreEl.textContent = score;
      if (score > highscore) {
        highscore = score;
        highscoreEl.textContent = highscore;
        localStorage.setItem('snake_hs', highscore);
      }
      placeFood();
      if (score % 5 === 0) {
        clearInterval(interval);
        currentSpeed = Math.max(55, 140 - score * 4);
        interval = setInterval(tick, currentSpeed);
      }
    } else {
      snake.pop();
    }
    draw();
  }

  function die() {
    clearInterval(interval);
    state = 'dead';
    draw();
    messageEl.innerHTML = `Mäng läbi! Skoor: <strong>${score}</strong> — vajuta <strong>▶ ALUSTA</strong>`;
  }

  // ── Drawing ────────────────────────────────────────────────────
  function draw() {
    const W    = canvas.width;
    const H    = canvas.height;
    const CELL = W / COLS;

    ctx.clearRect(0, 0, W, H);

    // grid
    ctx.strokeStyle = '#1e2d3d';
    ctx.lineWidth   = 0.5;
    for (let i=0; i<=COLS; i++) {
      ctx.beginPath(); ctx.moveTo(i*CELL,0); ctx.lineTo(i*CELL,H); ctx.stroke();
    }
    for (let j=0; j<=ROWS; j++) {
      ctx.beginPath(); ctx.moveTo(0,j*CELL); ctx.lineTo(W,j*CELL); ctx.stroke();
    }

    // food
    const fx = food.x*CELL + CELL/2;
    const fy = food.y*CELL + CELL/2;
    const fr = CELL/2 - Math.max(2, CELL*0.08);
    ctx.beginPath();
    ctx.arc(fx, fy, fr, 0, Math.PI*2);
    ctx.fillStyle = state==='dead' ? '#555' : '#f87171';
    ctx.fill();
    ctx.strokeStyle = '#4ade80'; ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.moveTo(fx, fy-fr);
    ctx.lineTo(fx+Math.max(2,CELL*0.1), fy-fr-Math.max(3,CELL*0.15));
    ctx.stroke();

    // snake
    snake.forEach((seg, i) => {
      const x = seg.x*CELL+1, y = seg.y*CELL+1, s = CELL-2;
      const r = Math.max(2, s*0.2);

      if (state==='dead') {
        ctx.fillStyle = '#555';
      } else if (i===0) {
        ctx.fillStyle = '#22c55e';
      } else {
        const t = i / snake.length;
        ctx.fillStyle = `hsl(${140 - t*30},70%,${45-t*10}%)`;
      }

      ctx.beginPath();
      ctx.roundRect(x, y, s, s, r);
      ctx.fill();

      // eyes
      if (i===0 && state!=='dead') {
        const ex = seg.x*CELL + CELL*0.35 + dir.x*CELL*0.1;
        const ey = seg.y*CELL + CELL*0.35 + dir.y*CELL*0.1;
        const er = Math.max(1.5, CELL*0.08);
        ctx.fillStyle = '#fff';
        ctx.beginPath(); ctx.arc(ex, ey, er*1.5, 0, Math.PI*2); ctx.fill();
        ctx.fillStyle = '#1a1a2e';
        ctx.beginPath(); ctx.arc(ex+dir.x*er*0.5, ey+dir.y*er*0.5, er*0.8, 0, Math.PI*2); ctx.fill();
      }
    });

    // idle overlay
    if (state==='idle') {
      ctx.fillStyle = 'rgba(0,0,0,0.6)';
      ctx.fillRect(0,0,W,H);
      ctx.fillStyle = '#4ade80';
      ctx.font = `bold ${Math.max(16,W*0.07)}px Segoe UI`;
      ctx.textAlign = 'center';
      ctx.fillText('🐍 USSIMÄNG', W/2, H/2-W*0.04);
      ctx.fillStyle = '#facc15';
      ctx.font = `${Math.max(12,W*0.045)}px Segoe UI`;
      ctx.fillText('Vajuta ▶ ALUSTA', W/2, H/2+W*0.06);
      ctx.textAlign = 'left';
    }

    // pause overlay
    if (state==='paused') {
      ctx.fillStyle = 'rgba(0,0,0,0.55)';
      ctx.fillRect(0,0,W,H);
      ctx.fillStyle = '#facc15';
      ctx.font = `bold ${Math.max(18,W*0.1)}px Segoe UI`;
      ctx.textAlign = 'center';
      ctx.fillText('PAUS', W/2, H/2);
      ctx.textAlign = 'left';
    }
  }

  // ── Keyboard ──────────────────────────────────────────────────
  document.addEventListener('keydown', e => {
    if (['ArrowUp','ArrowDown','ArrowLeft','ArrowRight',' '].includes(e.key)) e.preventDefault();

    if (state==='idle' || state==='dead') {
      if (e.code==='Space') { init(); return; }
    }
    if (e.code==='Space' || e.key==='p' || e.key==='P') {
      togglePause(); return;
    }
    if (state!=='running') return;
    changeDir(e.key);
  });

  function changeDir(key) {
    if ((key==='ArrowUp'    || key==='w' || key==='W') && dir!==DIR.DOWN)  nextDir=DIR.UP;
    if ((key==='ArrowDown'  || key==='s' || key==='S') && dir!==DIR.UP)    nextDir=DIR.DOWN;
    if ((key==='ArrowLeft'  || key==='a' || key==='A') && dir!==DIR.RIGHT) nextDir=DIR.LEFT;
    if ((key==='ArrowRight' || key==='d' || key==='D') && dir!==DIR.LEFT)  nextDir=DIR.RIGHT;
  }

  function togglePause() {
    if (state==='running') {
      clearInterval(interval);
      state='paused';
      messageEl.textContent='Paus — vajuta P või nuppu jätkamiseks';
      draw();
    } else if (state==='paused') {
      state='running';
      messageEl.textContent='';
      interval=setInterval(tick, currentSpeed);
    }
  }

  // ── D-pad buttons ──────────────────────────────────────────────
  function dpadPress(dirKey) {
    if (state==='idle' || state==='dead') { init(); return; }
    if (state==='paused') { togglePause(); return; }
    changeDir(dirKey);
  }

  document.getElementById('btn-up').addEventListener('click',    () => dpadPress('ArrowUp'));
  document.getElementById('btn-down').addEventListener('click',  () => dpadPress('ArrowDown'));
  document.getElementById('btn-left').addEventListener('click',  () => dpadPress('ArrowLeft'));
  document.getElementById('btn-right').addEventListener('click', () => dpadPress('ArrowRight'));
  document.getElementById('btn-start').addEventListener('click', () => {
    if (state==='idle' || state==='dead') { init(); return; }
    togglePause();
  });

  // ── Swipe gestures ────────────────────────────────────────────
  let touchX=null, touchY=null;

  canvas.addEventListener('touchstart', e => {
    e.preventDefault();
    touchX = e.touches[0].clientX;
    touchY = e.touches[0].clientY;
  }, {passive:false});

  canvas.addEventListener('touchend', e => {
    e.preventDefault();
    if (touchX===null) return;
    const dx = e.changedTouches[0].clientX - touchX;
    const dy = e.changedTouches[0].clientY - touchY;
    touchX=null; touchY=null;

    if (state==='idle' || state==='dead') { init(); return; }
    if (state==='paused') { togglePause(); return; }

    const minSwipe = 20;
    if (Math.abs(dx) < minSwipe && Math.abs(dy) < minSwipe) return;

    if (Math.abs(dx) > Math.abs(dy)) {
      changeDir(dx>0 ? 'ArrowRight' : 'ArrowLeft');
    } else {
      changeDir(dy>0 ? 'ArrowDown' : 'ArrowUp');
    }
  }, {passive:false});

  // ── Init ──────────────────────────────────────────────────────
  resize();
</script>
</body>
</html>
